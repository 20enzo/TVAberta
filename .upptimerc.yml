# Arquivo: .upptimerc.yml
# Fica na raiz do seu repositório no GitHub criado para o Upptime

owner: seu-usuario-do-github # Mude para o seu @ do GitHub
repo: nome-do-repositorio # Ex: "monitoramento-tvaberta"

sites:
  # 1. Seu Servidor de Streaming
  - name: 🎥 Servidor de Transmissão (Vídeo)
    url: https://br5093.streamingdevideo.com.br/tvaberto/tvaberto/chunklist_w694789056.m3u8

  # 2. Seu App / Webhook
  - name: 🤖 Chatbot WhatsApp (Cloud Run)
    # IMPORTANTE: Coloque a URL pública do seu Cloud Run aqui!
    # Já vi que você tem uma rota /health no seu server.js. Ela é perfeita para isso.
    url: https://SUA-URL-DO-CLOUD-RUN.run.app/health

  # 3. Google Services (Essenciais para o bot)
  - name: 🧠 API do Google Gemini
    # Testamos a rota de descoberta global da API para saber se os servidores do Google estão de pé
    url: https://generativelanguage.googleapis.com/$discovery/rest?version=v1beta 

  - name: 📊 Google Sheets (Planilhas)
    # Testamos o servidor principal de planilhas do Google
    url: https://sheets.googleapis.com/$discovery/rest?version=v4

status-website:
  # Configurações de aparência da sua página pública
  cname: status.tvaberta.tv.br # Se você for apontar o seu domínio próprio
  logoUrl: https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/1024px-Google_%22G%22_logo.svg.png
  name: Status Tv Aberta
  introTitle: "**Status dos Nossos Sistemas**"
  introMessage: Acompanhe a disponibilidade dos nossos serviços em tempo real.
  theme: light
